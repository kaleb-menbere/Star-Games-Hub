<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebirr Game Access</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00A651 0%, #007AC2 100%);
        }

        /* Overlay with Telebirr gradient */
        .payment-auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #00A651 0%, #007AC2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .payment-auth-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Card Container - Clean white */
        .payment-auth-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 87, 44, 0.2);
            max-width: 420px;
            width: 90%;
            padding: 40px 30px;
            text-align: center;
            animation: slideUp 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .payment-auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00A651, #007AC2);
        }

        /* Telebirr Logo/Icon */
        .payment-auth-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00A65110, #007AC210);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00A65120;
        }

        .payment-auth-icon svg {
            width: 50px;
            height: 50px;
        }

        /* Typography */
        .payment-auth-title {
            font-size: 26px;
            font-weight: 700;
            color: #1A2E3B;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .payment-auth-subtitle {
            font-size: 15px;
            color: #5E6F7D;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .payment-auth-subtitle strong {
            color: #00A651;
            font-weight: 700;
        }

        /* Telebirr Branded Button */
        .payment-auth-button {
            background: linear-gradient(135deg, #00A651, #007AC2);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 260px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 166, 81, 0.3);
        }

        .payment-auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 122, 194, 0.4);
        }

        .payment-auth-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .payment-auth-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Spinner with Telebirr colors */
        .payment-auth-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        /* Error Message */
        .payment-auth-error {
            background: #FFE5E5;
            color: #D83A3A;
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            border-left: 4px solid #D83A3A;
        }

        .payment-auth-error svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            fill: #D83A3A;
        }

        /* Success Message */
        .payment-auth-success {
            background: #E8F5E9;
            color: #00A651;
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            border-left: 4px solid #00A651;
        }

        .payment-auth-success svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            fill: #00A651;
        }

        /* Loader for game content */
        .payment-auth-game-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999998;
            backdrop-filter: blur(5px);
        }

        .payment-auth-game-loader.active {
            display: flex;
        }

        .payment-auth-game-loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E0E0E0;
            border-radius: 50%;
            border-top-color: #00A651;
            border-right-color: #007AC2;
            animation: spin 1s ease-in-out infinite;
        }

        /* Telebirr Mini App Badge */
        .payment-auth-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #E0E0E0;
            color: #5E6F7D;
            font-size: 13px;
        }

        .payment-auth-badge svg {
            width: 18px;
            height: 18px;
            fill: #00A651;
        }

        /* Game Content */
        #game-content {
            display: none;
            width: 100%;
            height: 100vh;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .payment-auth-card {
                padding: 30px 20px;
            }
            
            .payment-auth-title {
                font-size: 22px;
            }
            
            .payment-auth-subtitle {
                font-size: 14px;
            }
            
            .payment-auth-button {
                padding: 14px 28px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Payment Auth Overlay -->
    <div class="payment-auth-overlay" id="paymentAuthOverlay">
        <div class="payment-auth-card">
            <div class="payment-auth-icon" id="paymentAuthIcon">
                <!-- Telebirr style logo -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#00A651"/>
                    <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" fill="#007AC2"/>
                    <circle cx="12" cy="12" r="2" fill="#00A651"/>
                </svg>
            </div>
            <h2 class="payment-auth-title" id="paymentAuthTitle">telebirr Mini App</h2>
            <div class="payment-auth-subtitle" id="paymentAuthSubtitle">
                This game is exclusively available through <strong>telebirr SuperApp</strong><br>
                Please launch from the SuperApp to play
            </div>
            <button class="payment-auth-button" id="paymentAuthRetry">
                <svg viewBox="0 0 24 24">
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                </svg>
                Open in telebirr
            </button>
            <div class="payment-auth-error" id="paymentAuthError" style="display: none;">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span id="paymentAuthErrorMessage"></span>
            </div>
            <div class="payment-auth-badge">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span>Secure • Fast • Convenient</span>
            </div>
        </div>
    </div>

    <!-- Game Loader -->
    <div class="payment-auth-game-loader" id="paymentAuthGameLoader">
        <div class="payment-auth-game-loader-spinner"></div>
    </div>

    <!-- Game Content -->
    <div id="game-content">
        <!-- Game content will be loaded here -->
    </div>

    <!-- Payment Check Script -->
    <script src="payment-check.js"></script>
</body>
</html>
